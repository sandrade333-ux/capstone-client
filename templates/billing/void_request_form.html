{% extends "base.html" %}
{% block title %}Request Void — {{ invoice.invoice_number }}{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow p-6 max-w-2xl">
    <h1 class="text-2xl font-bold mb-2">Request Void</h1>
    <p class="text-gray-500 mb-6">Invoice {{ invoice.invoice_number }} — ${{ invoice.total }}</p>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded p-3 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label for="reason" class="block text-sm font-medium text-gray-700 mb-1">
                Why do you want to void this invoice?
            </label>
            <textarea name="reason" id="reason" rows="4" required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="e.g. Customer cancelled service before work was completed..."></textarea>
        </div>
        <div class="flex gap-3">
            <button type="submit"
                class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                Submit Void Request
            </button>
            <a href="{% url 'billing:invoice_detail' invoice.pk %}"
               class="px-4 py-2 rounded border border-gray-300 text-gray-700 hover:bg-gray-50">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
