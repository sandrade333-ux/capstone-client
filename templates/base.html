<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Capstone{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/admin/" class="text-lg font-semibold text-gray-800">Capstone</a>
            <div class="flex gap-4 text-sm">
                <a href="/admin/" class="text-gray-600 hover:text-gray-900">Admin</a>
                {% if user.is_authenticated %}
                    <span class="text-gray-400">{{ user.get_full_name|default:user.username }}</span>
                    <a href="/admin/logout/" class="text-gray-600 hover:text-gray-900">Sign out</a>
                {% else %}
                    <a href="/oauth2/login" class="text-blue-600 hover:text-blue-800 font-medium">Sign in with Microsoft</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
